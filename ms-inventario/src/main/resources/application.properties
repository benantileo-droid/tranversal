spring.application.name=ms-inventario

# Puerto
server.port=8084

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3307/inventario_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (misma clave que los otros microservicios)
jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes
eureka.instance.prefer-ip-address=true
