spring.application.name=ms-pedidos

# Puerto
server.port=8083

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/pedidos_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (debe ser la misma clave que ms-user y productos)
jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes
eureka.instance.prefer-ip-address=true

# URL del microservicio de productos
productos.service.url=http://localhost:8082
