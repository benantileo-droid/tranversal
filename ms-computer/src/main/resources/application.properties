spring.application.name=ms-computer

# Puerto
server.port=8090

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3307/computer_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (misma clave que los otros microservicios)
jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes
eureka.instance.prefer-ip-address=true
